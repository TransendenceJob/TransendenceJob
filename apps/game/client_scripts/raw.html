<!DOCTYPE html>
<html>
  <head>
    <style>
      /* Set up the canvas to be using the whole page */
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }
    </style>
  </head>
  
  <body>
  	<!-- Socket.io Connection -->
	  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <canvas id="renderCanvas" touch-action="none"></canvas>
    <!-- Babylon functions -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>

    <!-- Main script -->
    <script>

	function initWebSocket(url) {
		const socket = io(url, {
			transports: ['websocket']
		});

		socket.on("connect", () => {
			console.log("Connected to Backend");
		});
		
		socket.on("msgToClient", (data) => {
			console.log(`Message from server ${data}`);
		});
		
		socket.on("connect_error", (error) => {
			console.log("Error with websocket: ", error);
		});
		
		socket.on("disconnect", () => {
			console.log("Connection closed");
		});

		return (socket);
	}

	function circlingWrapper(scene, diameterBigBoll, diameterSmolBoll) {
		let i = 0;
		const speed = Math.PI / 120;
		const distance = (diameterBigBoll + diameterSmolBoll + 2) / 2;
		const sphere = scene.getMeshByName("sphere");
		const spherexy = scene.getMeshByName("sphere_xy");
		const spherexz = scene.getMeshByName("sphere_xz");
		const sphereyz = scene.getMeshByName("sphere_yz");
		if (scene.actionManager == undefined)
			scene.actionManager = new BABYLON.ActionManager();
		scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(
			BABYLON.ActionManager.OnEveryFrameTrigger,
			() => {
				i = (i + speed) % (Math.PI * 2);
				let a = -Math.sin(i) * distance;
				let b = Math.cos(i) * distance;
				let c = Math.sin(i) * distance;
				spherexy.position = new BABYLON.Vector3(a, b, c);
				spherexy.rotation = new BABYLON.Vector3(i, 0, 0)
				spherexz.position = new BABYLON.Vector3(b, c, a);
				spherexz.rotation = new BABYLON.Vector3(0, 0, i)
				sphereyz.position = new BABYLON.Vector3(c, a, b);
				sphereyz.rotation = new BABYLON.Vector3(i, 0, 0);
				sphere.rotation.y = i;
			}
		));
	}

	function createSmolBoll(name, diameter, texturePath, scene) {
		const sphere = BABYLON.MeshBuilder.CreateSphere("sphere_" + name, {diameter: diameter, segments: 32}, scene);
		sphere.material = new BABYLON.StandardMaterial(name, scene);
		sphere.material.diffuseTexture = new BABYLON.Texture(texturePath);
		return (sphere);
	}

		sphere.material = new BABYLON.StandardMaterial("main_material", scene);
		sphere.material.diffuseTexture = new BABYLON.Texture(textGrass);
		createSmolBoll("xy", diameterSmolBoll, textLava, scene);
		createSmolBoll("xz", diameterSmolBoll, textRock, scene);
		createSmolBoll("yz", diameterSmolBoll, textIce, scene);
		circlingWrapper(scene, diameterBigBoll, diameterSmolBoll);

		return scene;
	};

	const canvas = document.getElementById("renderCanvas"); // Get the canvas element
	const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine

	const socket = initWebSocket("ws://localhost:$NGINX_PORT");

	// Create meshes
	const scene = createScene();


	// Register a render loop to repeatedly render the scene
	engine.runRenderLoop(function () {
	scene.render();
	});

	// Watch for browser/canvas resize events
	window.addEventListener("resize", function () {
	engine.resize();
	});
    </script>
  </body>
</html>
