<!DOCTYPE html>
<html>
  <head>
    <style>
      /* Set up the canvas to be using the whole page */
      html,
      body {
        overflow: hidden;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }
    </style>
  </head>
  
  <body>
  	<!-- Socket.io Connection -->
	  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <canvas id="renderCanvas" touch-action="none"></canvas>
    <!-- Babylon functions -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
	
    
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <!-- Main script -->
    <script>

	function setupSocket(socket, gui) {
		const socket_status = gui.getControlByName("socket_status");
		const receiveButton = gui.getControlByName("receive");

		socket.on("connect", () => {
			console.log("Connected to Backend");
			socket_status.text = "Connection Status: Connected";
			socket_status.color = "green";
		});
		
		socket.on("msgToClient", (data) => {
			console.log(`Message from server ${data}`);
			const dataObj = JSON.parse(data);
			receiveButton.textBlock.text = "Received: [" + JSON.stringify(dataObj) + "]";
		});
		
		socket.on("connect_error", (error) => {
			console.log("Error with websocket: ", error);
			socket_status.text = "Connection Status: Errror";
			socket_status.color = "red";
		});
		
		socket.on("disconnect", () => {
			console.log("Connection closed");
			socket_status.text = "Connection Status: Disconnected";
			socket_status.color = "red";
		});

		return (socket);
	}

	function setButtonSize(button, canvas, size_x, size_y)
	{
		button.widthInPixels = canvas.width * size_x;
		button.heightInPixels = canvas.height * size_y;
	}

	function setButtonPos(button, canvas, pos_x, pos_y)
	{
		button.left =  pos_x * ((canvas.width - button.widthInPixels) / 2);
		button.top =  pos_y * ((canvas.height - button.heightInPixels) / 2);
	}

	function createGui(scene, canvas, socket)
	{
		let count = 0;
		const gui = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI(
			"GUI",
			true,
			scene,
		);

		const socket_status = new BABYLON.GUI.TextBlock("socket_status", "Connection Status: Disconnected");
		socket_status.fontSize = 24;
		socket_status.color = "red";
		const size = socket_status.fontSize.replace('px', '');
		socket_status.top =  -1 * ((canvas.height - size) / 2);
		gui.addControl(socket_status);

		const receiveButton = BABYLON.GUI.Button.CreateSimpleButton("receive", "No Messages received");
		setButtonSize(receiveButton, canvas, 0.8, 0.2);
		setButtonPos(receiveButton, canvas, 1, 1);
		receiveButton.color = "#FFF";
		gui.addControl(receiveButton);

		const button = BABYLON.GUI.Button.CreateSimpleButton("send", "SEND");
		setButtonSize(button, canvas, 0.2, 0.2);
		setButtonPos(button, canvas, -1, 1);
		button.color = "#FFF";
		button.onPointerUpObservable.add(() => {
			count++;
			const data = {
				type: "User clicked",
				timestamp: Date.now(),
				message: `User pressed button for the ${count} time`,
				};
				if (socket && socket.connected) {
					socket.emit('msgToServer', JSON.stringify(data));
				} else {
					console.warn("No Websocket Connection established");
				}
			})
		gui.addControl(button);

		return (gui)
	}

	function createBoll(scene) {
		const backgroundPlane = BABYLON.MeshBuilder.CreatePlane("backgroundPlane", { width: 30, height: 30 }, scene);
		backgroundPlane.position = new BABYLON.Vector3(0, -4, 4); 
		backgroundPlane.rotation.x = (25 / 180 ) * Math.PI;
		backgroundPlane.material = new BABYLON.StandardMaterial("space", scene);
		backgroundPlane.material.diffuseTexture = new BABYLON.Texture("https://live.staticflickr.com/5173/5436446554_9244788c36_b.jpg", scene);
		backgroundPlane.material.emissiveTexture = backgroundPlane.material.diffuseTexture;
		backgroundPlane.material.emissiveColor = new BABYLON.Color3(1, 1, 1);
		backgroundPlane.material.disableLighting = true;

		var sphere = BABYLON.MeshBuilder.CreateSphere("sphere", {diameter: 7, segments: 32}, scene);
		sphere.material = new BABYLON.StandardMaterial("main_material", scene);
		const textRock = "https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e1af5341-94c9-4f7c-b3b5-794f7b3ac690/d39vfot-603b0ab6-78e9-4ff5-a70a-5c63ee317dd2.jpg/v1/fill/w_894,h_894,q_70,strp/stone_texture___seamless_by_agf81_d39vfot-pre.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9OTAwIiwicGF0aCI6Ii9mL2UxYWY1MzQxLTk0YzktNGY3Yy1iM2I1LTc5NGY3YjNhYzY5MC9kMzl2Zm90LTYwM2IwYWI2LTc4ZTktNGZmNS1hNzBhLTVjNjNlZTMxN2RkMi5qcGciLCJ3aWR0aCI6Ijw9OTAwIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.SPIlcN9JWCPtX6LUrCNeoctBo2Rl90GSenx8FqbNMkY";
		sphere.material.diffuseTexture = new BABYLON.Texture(textRock);
		let x = 0;
		let y = 0;
		let z = 0;
		const speed = Math.PI / 400;
		if (scene.actionManager == undefined)
			scene.actionManager = new BABYLON.ActionManager();
		scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(
			BABYLON.ActionManager.OnEveryFrameTrigger,
			() => {
				x = (x + speed) % (Math.PI * 2);
				y = (y + speed / 2) % (Math.PI * 2);
				z = (z + speed / 4) % (Math.PI * 2);
				sphere.rotation = new BABYLON.Vector3(x, y, z)
			}
		));
		return (sphere);
	}

	function createScene(canvas, socket) {
		var scene = new BABYLON.Scene(engine);
		var camera = new BABYLON.FreeCamera("camera1", new BABYLON.Vector3(0, 5, -10), scene);
		camera.setTarget(BABYLON.Vector3.Zero());
		var light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
		light.intensity = 0.7;

		const sphere = createBoll(scene);

    	const gui = createGui(scene, canvas, socket);
		setupSocket(socket, gui);

		return scene;
	};

	const canvas = document.getElementById("renderCanvas"); // Get the canvas element
	const engine = new BABYLON.Engine(canvas, true); // Generate the BABYLON 3D engine
	const socket = io("ws://localhost:3003", {transports: ['websocket']});
	const scene = createScene(canvas, socket);
	engine.runRenderLoop(function () {
		scene.render();
	});
	window.addEventListener("resize", function () {
		engine.resize();
	});
    </script>
  </body>
</html>
