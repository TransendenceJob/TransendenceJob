components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
      required:
        - code
        - message
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: stefan@example.com
        password:
          type: string
          minLength: 8
          example: StrongPassword123!
        displayName:
          type: string
          minLength: 2
          maxLength: 32
          example: Stefan
        username:
          type: string
          minLength: 3
          maxLength: 24
          pattern: "^[a-zA-Z0-9_]+$"
          example: theochiper
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: stefan@example.com
        password:
          type: string
          minLength: 8
          example: StrongPassword123!
      required:
        - email
        - password
    GoogleExchangeRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [google]
        authorizationCode:
          type: string
          description: OAuth authorization code received by the browser callback flow.
        idToken:
          type: string
          description: Google ID token for direct token exchange.
        redirectUri:
          type: string
          format: uri
      required:
        - provider
      oneOf:
        - required:
            - authorizationCode
            - redirectUri
        - required:
            - idToken
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token currently held by the client.
        logoutAll:
          type: boolean
          default: false
          description: When true, revoke all active sessions for this user.
      required:
        - refreshToken
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    SetPasswordRequest:
      type: object
      properties:
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
      required:
        - password
    UserStatus:
      type: string
      enum: [active, disabled, pending]
    UserRole:
      type: string
      enum: [user, moderator, admin]
    AuthProviderLink:
      type: object
      properties:
        provider:
          type: string
          example: google
        providerUserId:
          type: string
          example: google-uid
      required:
        - provider
        - providerUserId
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        createdAt:
          type: string
          format: date-time
          nullable: true
        providers:
          type: array
          items:
            $ref: "#/components/schemas/AuthProviderLink"
      required:
        - id
        - email
        - roles
        - status
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token TTL in seconds.
          example: 900
        tokenType:
          type: string
          example: Bearer
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
    SessionInfo:
      type: object
      properties:
        id:
          type: string
        expiresAt:
          type: string
          format: date-time
        revoked:
          type: boolean
          nullable: true
      required:
        - id
        - expiresAt
    VerifyClaims:
      type: object
      properties:
        sub:
          type: string
        iat:
          type: integer
        exp:
          type: integer
        iss:
          type: string
        aud:
          type: string
          nullable: true
      required:
        - sub
        - iat
        - exp
        - iss
    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        session:
          $ref: "#/components/schemas/SessionInfo"
      required:
        - success
        - user
        - tokens
        - session
    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        session:
          $ref: "#/components/schemas/SessionInfo"
      required:
        - success
        - tokens
        - session
    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        revokedSessionIds:
          type: array
          items:
            type: string
      required:
        - success
        - revokedSessionIds
    SetPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
      required:
        - success
    VerifyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        valid:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/SessionInfo"
        claims:
          $ref: "#/components/schemas/VerifyClaims"
      required:
        - success
        - valid
        - user
        - session
        - claims
    AuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/SessionInfo"
        claims:
          $ref: "#/components/schemas/VerifyClaims"
      required:
        - success
        - user
        - session
        - claims
    PageInfo:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
        hasNextPage:
          type: boolean
      required:
        - hasNextPage
    UserSearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuthUser"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - pageInfo
    UserDetailResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - user
    DisableUserRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 255
        revokeSessions:
          type: boolean
          default: true
      required:
        - reason
    EnableUserRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 255
    SetUserRolesRequest:
      type: object
      properties:
        roles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/UserRole"
      required:
        - roles
    RevokeSessionsRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 255
    UserDisabledResponse:
      type: object
      properties:
        userId:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
        revokedSessions:
          type: integer
          minimum: 0
      required:
        - userId
        - status
        - revokedSessions
    UserEnabledResponse:
      type: object
      properties:
        userId:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
      required:
        - userId
        - status
    UserRolesResponse:
      type: object
      properties:
        userId:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        updatedAt:
          type: string
          format: date-time
      required:
        - userId
        - roles
        - updatedAt
    RevokeSessionsResponse:
      type: object
      properties:
        userId:
          type: string
        revokedSessions:
          type: integer
          minimum: 0
      required:
        - userId
        - revokedSessions
    AuditAction:
      type: string
      enum:
        - REGISTER
        - LOGIN_SUCCESS
        - LOGIN_FAILED
        - LOGOUT
        - TOKEN_REFRESH
        - GOOGLE_EXCHANGE
        - USER_DISABLED
        - ROLE_UPDATED
        - SESSIONS_REVOKED
    AuditLogItem:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          nullable: true
        actorUserId:
          type: string
          nullable: true
        action:
          $ref: "#/components/schemas/AuditAction"
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - metadata
        - createdAt
    AuditListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogItem"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
      required:
        - items
        - pageInfo
    UpdatePlayerStatsRequest:
      type: object
      properties:
        matchesWon:
          type: array
          items:
            type: string
            format: uuid
        matchesLost:
          type: array
          items:
            type: string
            format: uuid
        achievements:
          type: array
          items:
            type: string
            format: uuid
        weapons:
          type: array
          items:
            type: string
            format: uuid
        matchParticipants:
          type: array
          items:
            type: string
            format: uuid
        xp:
          type: number
        level:
          type: number
        wins:
          type: number
        losses:
          type: number
        kills:
          type: number
        deaths:
          type: number
        damageDealt:
          type: number
        damageTaken:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: true
    PlayerStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        matchesWon:
          type: array
          items:
