          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout from current session or all sessions
      operationId: logoutViaBff
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          description: Bad Request
          content:
            application/json:
