openapi: 3.0.3
info:
  title: BFF API Gateway
  version: 0.1.0
servers:
  - url: https://api.example.com
paths:
  /:
    get:
      tags:
        - System
      summary: BFF service root health probe
      operationId: getBffRoot
      responses:
        "200":
          description: Service greeting returned by the BFF root controller
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!
      security: []
  /bff/lobby:
    get:
      tags:
        - System
      summary: Proxy the game lobby health/greeting endpoint
      operationId: getBffLobby
      responses:
        "200":
          description: Lobby service response body
          content:
            text/plain:
              schema:
                type: string
        "502":
          description: Downstream game service is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new account
      operationId: registerViaBff
      responses:
        "201":
          description: User registered and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login with email and password
      operationId: loginViaBff
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout from current session or all sessions
      operationId: logoutViaBff
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "400":
          description: Bad Request
          content:
            application/json:
