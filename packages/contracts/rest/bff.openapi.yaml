components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
      required:
        - code
        - message
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: stefan@example.com
        password:
          type: string
          minLength: 8
          example: StrongPassword123!
        displayName:
          type: string
          minLength: 1
          maxLength: 100
          example: Stefan
        username:
          type: string
          minLength: 3
          maxLength: 30
          example: theochiper
      required:
        - email
        - password
        - displayName
        - username
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: stefan@example.com
        password:
          type: string
          minLength: 8
          example: StrongPassword123!
      required:
        - email
        - password
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token currently held by the client.
        logoutAll:
          type: boolean
          default: false
          description: When true, revoke all active sessions for this user.
      required:
        - refreshToken
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, DISABLED, PENDING_VERIFICATION]
      required:
        - id
        - email
        - roles
        - status
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token TTL in seconds.
          example: 900
        tokenType:
          type: string
          example: Bearer
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
    SessionInfo:
      type: object
      properties:
        id:
          type: string
        expiresAt:
          type: string
          format: date-time
        revoked:
          type: boolean
          nullable: true
      required:
        - id
        - expiresAt
    VerifyClaims:
      type: object
      properties:
        sub:
          type: string
        iat:
          type: integer
        exp:
          type: integer
        iss:
          type: string
        aud:
          type: string
          nullable: true
      required:
        - sub
        - iat
        - exp
        - iss
    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/AuthUser"
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        session:
          $ref: "#/components/schemas/SessionInfo"
      required:
        - success
        - user
        - tokens
        - session
    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        tokens:
          $ref: "#/components/schemas/AuthTokens"
        session:
          $ref: "#/components/schemas/SessionInfo"
      required:
        - success
        - tokens
        - session
    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        revokedSessionIds:
          type: array
          items:
            type: string
      required:
        - success
        - revokedSessionIds
    VerifyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        valid:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/SessionInfo"
        claims:
          $ref: "#/components/schemas/VerifyClaims"
      required:
        - success
        - valid
        - user
        - session
        - claims
    AuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          $ref: "#/components/schemas/SessionInfo"
        claims:
          $ref: "#/components/schemas/VerifyClaims"
      required:
        - success
        - user
        - session
        - claims
    OAuthStartResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        provider:
          type: string
          enum: [google]
        authorizationUrl:
          type: string
          format: uri
        state:
          type: string
      required:
        - success
        - provider
        - authorizationUrl
