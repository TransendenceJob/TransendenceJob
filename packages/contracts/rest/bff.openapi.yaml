openapi: 3.0.3
info:
  title: BFF API Gateway
  version: 0.1.0
servers:
  - url: https://api.example.com
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new account
      operationId: registerViaBff
      responses:
        "201":
          description: User registered and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login with email and password
      operationId: loginViaBff
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
