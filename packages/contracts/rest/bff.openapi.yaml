      summary: Verify current access token
      operationId: verifyViaBff
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
  /auth/google/exchange:
    post:
      tags:
        - Auth
      summary: Exchange Google credentials for an authenticated BFF session
      description: Accepts either a Google OAuth authorization code with redirect URI or a Google ID token, then proxies the exchange to the internal auth service.
      operationId: exchangeGoogleAuthViaBff
      responses:
        "200":
          description: Google exchange successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Google account conflicts with an existing identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleExchangeRequest"
            examples:
              idToken:
                value:
                  provider: google
                  idToken: google-id-token
              authorizationCode:
                value:
                  provider: google
                  authorizationCode: 4/0AQSTgQ...
                  redirectUri: http://localhost:3000/auth/google/callback
  /auth/google/start:
    get:
      tags:
        - Auth
      summary: Start Google OAuth flow
      operationId: startGoogleOauthViaBff
      responses:
        "302":
          description: Redirect to Google OAuth consent URL
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Google OAuth consent URL
      security: []
  /auth/google/callback:
    get:
      tags:
        - Auth
      summary: Handle Google callback and redirect to frontend callback URL
      operationId: exchangeGoogleCallbackViaBff
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend callback URL with success or error parameters
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Frontend callback URL containing tokens (fragment) or OAuth error details
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      security: []
  /auth/google/link:
    post:
      summary: Link Google account
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "400":
