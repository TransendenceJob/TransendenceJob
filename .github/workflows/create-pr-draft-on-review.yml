name: Create PR Draft and Post Link on Review

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  create-draft-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const commit = context.payload.head_commit;
            if (!commit) {
              core.info('No head_commit; skipping.');
              return;
            }

            const msg = commit.message || '';
            const norm = (s) => String(s ?? '').trim();
            const endKey = norm(process.env.COMMIT_KEYWORD_END || '[END]');
            const endRe = new RegExp(`${endKey}\\s*\\[#(\\d+)\\]`, 'i');
            const endMatch = msg.match(endRe);

            if (!endMatch) {
              core.info('No [END] keyword found in commit; skipping PR creation.');
              return;
            }

            const issueNumber = Number(endMatch[1]);
            if (!issueNumber) {
              core.info('No issue number found; skipping.');
              return;
            }

            // Get the issue to extract title and details
            const issue = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
            const issueTitle = issue.data.title || '';
            const issueLabels = (issue.data.labels || []).map(l => typeof l === 'string' ? l : l.name);
            
            // Validate issue has a type label
            const labelFeature = norm(process.env.LABEL_FEATURE || 'feature');
            const labelBug = norm(process.env.LABEL_BUG || 'bug');
            const labelRefactor = norm(process.env.LABEL_REFACTOR || 'refactor');
            const labelFix = norm(process.env.LABEL_FIX || 'fix');
            const validTypes = [labelFeature, labelBug, labelRefactor, labelFix];
            const hasValidLabel = issueLabels.some(l => validTypes.includes(norm(l)));

            if (!hasValidLabel) {
              core.warning(`Issue #${issueNumber} does not have a valid type label. Skipping PR creation.`);
              return;
            }

            const branchName = context.ref.replace('refs/heads/', '');

            // Determine base branch (main for fixes, development for features)
            const labels = issueLabels.map(l => l.toLowerCase());
            const isFix = labels.includes('fix') || issueTitle.includes('[fix]');
            const baseBranch = isFix ? 'main' : 'development';

            // Create draft PR with issue title
            const prTitle = `[#${issueNumber}] ${issueTitle}`;
            const prBody =
              `## Issue\nCloses #${issueNumber}\n\n` +
              `## Description\n` +
              `This PR addresses #${issueNumber}.\n\n` +
              `## Checklist\n` +
              `- [ ] Tests added/updated\n` +
              `- [ ] Documentation updated\n` +
              `- [ ] Ready for review`;

            try {
              // Check if PR already exists for this branch
              const existing = await github.rest.pulls.list({
                ...repo,
                state: 'open',
                head: `${repo.owner}:${branchName}`,
                base: baseBranch
              });

              let prNumber;
              if (existing.data.length > 0) {
                prNumber = existing.data[0].number;
                core.info(`Draft PR already exists: #${prNumber}`);
              } else {
                const created = await github.rest.pulls.create({
                  ...repo,
                  title: prTitle,
                  head: branchName,
                  base: baseBranch,
                  body: prBody,
                  draft: true
                });
                prNumber = created.data.number;
                core.info(`Created draft PR #${prNumber}`);
              }

              // Post comment on issue with PR link
              const prUrl = `https://github.com/${repo.owner}/${repo.repo}/pull/${prNumber}`;
              const comment =
                `🚀 Draft PR created and ready for review!\n\n` +
                `**[PR #${prNumber}](${prUrl})** (Draft)\n\n` +
                `Click the link above to review the changes or convert to ready for review.`;

              // Check if comment already exists to avoid duplicates
              const existingComments = await github.rest.issues.listComments({
                ...repo,
                issue_number: issueNumber
              });

              const prCommentExists = existingComments.data.some(c =>
                c.body.includes(`PR #${prNumber}`) && c.body.includes('Draft PR created')
              );

              if (!prCommentExists) {
                await github.rest.issues.createComment({
                  ...repo,
                  issue_number: issueNumber,
                  body: comment
                });
                core.info(`Posted PR link comment on issue #${issueNumber}`);
              } else {
                core.info(`PR comment already posted on issue #${issueNumber}`);
              }
            } catch (e) {
              core.warning(`Failed to create/link PR: ${e.message}`);
            }
        env:
          COMMIT_KEYWORD_END: ${{ vars.COMMIT_KEYWORD_END }}
