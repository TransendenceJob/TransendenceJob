name: Post PR link on "in review" label

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  post-pr-link:
    if: ${{ github.event.label.name == vars.LABEL_IN_REVIEW || github.event.label.name == 'in review' }}
    runs-on: ubuntu-latest
    env:
      DEFAULT_BASE_BRANCH: ${{ vars.DEFAULT_BASE_BRANCH }}
      MAIN_BRANCH: ${{ vars.MAIN_BRANCH }}
      LABEL_FIX: ${{ vars.LABEL_FIX }}
      LABEL_IN_REVIEW: ${{ vars.LABEL_IN_REVIEW }}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = context.repo;
            const issue = context.payload.issue;

            const norm = (s) => String(s ?? '').trim();
            const lower = (s) => norm(s).toLowerCase();

            const main = norm(process.env.MAIN_BRANCH || 'main');
            const dev = norm(process.env.DEFAULT_BASE_BRANCH || 'development');
            const fixLabel = lower(process.env.LABEL_FIX || 'fix');

            const issueNumber = issue.number;
            const issueTitle = issue.title || `Issue #${issueNumber}`;
            const assignee = issue.assignees?.[0]?.login;

            if (!assignee) {
              core.info(`Issue #${issueNumber} has no assignee; skipping PR creation.`);
              return;
            }

            const labels = (issue.labels || []).map(l => lower(typeof l === 'string' ? l : l.name));
            const isFix = labels.includes(fixLabel) || lower(issueTitle).includes('[fix]');
            const base = isFix ? main : dev;
            const branchName = `${issueNumber}_${assignee}`.toLowerCase();

            async function branchExists(branch) {
              try {
                await github.rest.git.getRef({
                  ...repo,
                  ref: `heads/${branch}`,
                });
                return true;
              } catch {
                return false;
              }
            }

            async function findExistingPr(branch) {
              const prs = await github.rest.pulls.list({
                ...repo,
                state: 'open',
                head: `${repo.owner}:${branch}`,
              });
              return prs.data[0] || null;
            }

            if (!(await branchExists(branchName))) {
              core.info(`Branch ${branchName} does not exist; skipping.`);
              return;
            }

            const existingPr = await findExistingPr(branchName);
            if (existingPr) {
              core.info(`PR already exists for ${branchName}: #${existingPr.number}`);
            }

            const compareUrl = `https://github.com/${repo.owner}/${repo.repo}/compare/${base}...${repo.owner}:${branchName}?expand=1`;
            const marker = `<!-- pr-owner-link:${issueNumber}:${base}:${branchName} -->`;
            const suggestedTitle = `[#${issueNumber}] ${issueTitle}`;
            const suggestedBody = `Closes #${issueNumber}`;

            const comment = existingPr
              ? `${marker}\n✅ Open PR already exists: **[#${existingPr.number}](${existingPr.html_url})**\n\nNo automatic PR was created by workflow (teammates should own their PRs).`
              : `${marker}\n🚀 Ready for review. Open the PR as your own user account:\n\n- **Create PR**: ${compareUrl}\n- **Base**: \`${base}\`\n- **Head**: \`${branchName}\`\n- **Suggested title**: \`${suggestedTitle}\`\n- **Suggested body**: \`${suggestedBody}\``;

            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const alreadyPosted = comments.data.some(c => (c.body || '').includes(marker));
            if (alreadyPosted) {
              core.info(`PR guidance comment already posted for issue #${issueNumber}`);
              return;
            }

            await github.rest.issues.createComment({
              ...repo,
              issue_number: issueNumber,
              body: comment,
            });

            core.info(`Posted PR creation link for issue #${issueNumber}`);