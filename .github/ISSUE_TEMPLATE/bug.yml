name: Bug
description: Report a defect or broken flow.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for defects. The parsed block supports your current GitHub Project automation.

  - type: textarea
    id: summary_block
    attributes:
      label: Parsed project fields
      description: Keep the markers exactly as written so automation can parse them.
      value: |
        [Importance:] Urgent
        [Duration:] 1 Day
        {P0}
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend
        - Frontend
        - DevOps
        - Game Server
        - BFF / API Gateway
        - Database
        - QA / Test
        - Documentation
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: What is broken?
      placeholder: Describe the observed behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / traces
      description: Paste errors, stack traces, screenshots, or reproduction payloads.

  - type: textarea
    id: acceptance
    attributes:
      label: Fix acceptance criteria
      placeholder: |
        - Root cause identified
        - Regression test added
        - Flow works in development
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I verified this is reproducible.
        - label: I included enough detail to debug it.
        - label: I listed the affected service or flow.
