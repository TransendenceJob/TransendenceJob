services:
  nginx:
    profiles: ["dev"]
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${NGINX_HTTP_PORT:-8080}:${NGINX_INTERNAL_PORT:-80}"
    environment:
      NGINX_INTERNAL_PORT: ${NGINX_INTERNAL_PORT:-80}
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT:-3000}
      BFF_INTERNAL_PORT: ${BFF_INTERNAL_PORT:-3000}
      GAME_INTERNAL_PORT: ${GAME_INTERNAL_PORT:-3001}
    volumes:
      - ../infra/nginx/nginx.dev.conf.template:/etc/nginx/templates/default.conf.template:ro
      - nginx_maps:/usr/share/nginx/html/maps
    depends_on:
      - frontend
      - bff
      - game_service
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    profiles: ["dev"]
    build:
      context: ../apps/frontend
      target: development
    container_name: frontend
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: ${FRONTEND_INTERNAL_PORT:-3000}
      BFF_INTERNAL_URL: http://bff:${BFF_INTERNAL_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
      - ../shared/game:/app/shared
    ports:
      - "${FRONTEND_HOST_PORT:-3005}:${FRONTEND_INTERNAL_PORT:-3000}"
    command: ["sh", "-lc", "npm ci && npm run dev -- -H 0.0.0.0 -p ${FRONTEND_INTERNAL_PORT:-3000}"]
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bff:
    profiles: ["dev"]
    build:
      context: ../apps/BFF
      target: development
    container_name: bff
    working_dir: /app
    environment:
      NODE_ENV: development
      SERVICE_NAME: bff
      PORT: ${BFF_INTERNAL_PORT:-3000}
      AUTH_SERVICE_URL: http://auth_service:${AUTH_INTERNAL_PORT:-3000}
      SOCIAL_SERVICE_URL: http://social_service:${SOCIAL_INTERNAL_PORT:-3000}
      STATS_SERVICE_URL: http://stats_service:${STATS_INTERNAL_PORT:-3000}
      GAME_SERVICE_HTTP_URL: http://game_service:${GAME_INTERNAL_PORT:-3001}
      GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_ID}
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/auth/google/callback
      GOOGLE_STATE_SECRET: ${GOOGLE_STATE_SECRET}
      GOOGLE_FRONTEND_CALLBACK_URL: http://localhost:8080/auth/google/callback
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_INTERNAL_PORT:-5672}
    volumes:
      - ../apps/BFF:/app
      - bff_node_modules:/app/node_modules
      - bff_dist:/app/dist
    command: ["sh", "-lc", "npm ci && npm run start:debug"]
    ports:
      - "${BFF_HOST_PORT:-3000}:${BFF_INTERNAL_PORT:-3000}"
      - "${BFF_DEBUG_HOST_PORT:-9229}:9229"
    depends_on:
      postgres_auth:
        condition: service_healthy
      postgres_social:
        condition: service_healthy
      postgres_stats:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth_service:
    profiles: ["dev"]
    build:
      context: ../apps/auth-user
      target: development
    container_name: auth_service
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: ${AUTH_INTERNAL_PORT:-3000}
      DB_HOST: postgres_auth
      DB_PORT: 5432
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: ${AUTH_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      REFRESH_TOKEN_BYTES: ${REFRESH_TOKEN_BYTES}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      REFRESH_TOKEN_HASH_PEPPER: ${REFRESH_TOKEN_HASH_PEPPER}
      GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_ID}
      GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/auth/google/callback
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      SERVICE_NAME: ${SERVICE_NAME}
      SERVICE_VERSION: ${SERVICE_VERSION}
      DATABASE_URL: postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@postgres_auth:5432/${AUTH_DB_NAME}?schema=public
      PRISMA_GENERATE_ON_START: "true"
      PRISMA_RUN_MIGRATIONS: "true"
    volumes:
      - ../apps/auth-user:/app
      - auth_service_node_modules:/app/node_modules
      - auth_service_dist:/app/dist
    ports:
      - "${AUTH_HOST_PORT:-3001}:${AUTH_INTERNAL_PORT:-3000}"
      - "${AUTH_DEBUG_HOST_PORT:-9230}:9229"
    entrypoint: ["sh", "/app/scripts/prismarun.sh"]
    command: ["npm", "run", "start:debug"]
    depends_on:
      postgres_auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  social_service:
    profiles: ["dev"]
    build:
      context: ../apps/social
      target: development
    container_name: social_service
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: ${SOCIAL_INTERNAL_PORT:-3000}
      DB_HOST: postgres_social
      DB_PORT: 5432
      DB_USER: ${SOCIAL_DB_USER}
      DB_PASSWORD: ${SOCIAL_DB_PASSWORD}
      DB_NAME: ${SOCIAL_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_INTERNAL_PORT:-5672}
    volumes:
      - ../apps/social:/app
      - social_service_node_modules:/app/node_modules
      - social_service_dist:/app/dist
    ports:
      - "${SOCIAL_HOST_PORT:-3002}:${SOCIAL_INTERNAL_PORT:-3000}"
      - "${SOCIAL_DEBUG_HOST_PORT:-9232}:9229"
    command: ["sh", "-lc", "npm ci && npm run start:debug"]
    depends_on:
      postgres_social:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stats_service:
    profiles: ["dev"]
    build:
      context: ../apps/stats
      target: development
    container_name: stats_service
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: ${STATS_INTERNAL_PORT:-3000}
      # PORT: asdasd
      DB_HOST: postgres_stats
      DB_PORT: 5432
      DB_USER: ${STATS_DB_USER}
      DB_PASSWORD: ${STATS_DB_PASSWORD}
      DB_NAME: ${STATS_DB_NAME}
      RABBITMQ_HOST: rabbitmq
      DATABASE_URL: postgresql://${STATS_DB_USER}:${STATS_DB_PASSWORD}@postgres_stats:5432/${STATS_DB_NAME}?schema=public
      RABBITMQ_PORT: ${RABBITMQ_INTERNAL_PORT:-5672}
    volumes:
      - ../apps/stats:/app
      - stats_service_node_modules:/app/node_modules
      - stats_service_dist:/app/dist
    ports:
      - "${STATS_HOST_PORT:-3004}:${STATS_INTERNAL_PORT:-3000}"
      - "${STATS_DEBUG_HOST_PORT:-9234}:9229"
    command: ["sh", "-lc", "npm ci && npm run start:debug"]
    depends_on:
      postgres_stats:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  game_service:
    profiles: ["dev"]
    build:
      context: ../apps/game
      target: development
    container_name: game_service
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: ${GAME_INTERNAL_PORT:-3001}
      DEBUG_PORT: ${GAME_DEBUG_INTERNAL_PORT:-9231}
      DB_HOST: postgres_game
      DB_PORT: 5432
      DB_USER: ${GAME_DB_USER}
      DB_PASSWORD: ${GAME_DB_PASSWORD}
      DB_NAME: ${GAME_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_INTERNAL_PORT:-5672}
      MAP_EXPORT_DIR: /app/generated/maps
    volumes:
      - ../apps/game:/app
      - game_service_node_modules:/app/node_modules
      - game_service_dist:/app/dist
      - ../shared/game:/app/shared
      - nginx_maps:/app/generated/maps
    ports:
      - "${GAME_HOST_PORT:-3003}:${GAME_INTERNAL_PORT:-3001}"
      - "${GAME_DEBUG_HOST_PORT:-9231}:${GAME_DEBUG_INTERNAL_PORT:-9231}"
    command: ["sh", "-lc", "npm ci && npm run start:debug"]
    depends_on:
      postgres_game:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [backend]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  auth_service_node_modules:
  auth_service_dist:
  bff_node_modules:
  bff_dist:
  frontend_node_modules:
  frontend_next:
  game_service_node_modules:
  game_service_dist:
  nginx_maps:
  social_service_node_modules:
  social_service_dist:
  stats_service_node_modules:
  stats_service_dist: