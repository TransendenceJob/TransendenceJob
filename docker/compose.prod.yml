services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    environment:
      NGINX_INTERNAL_PORT: ${NGINX_INTERNAL_PORT:-80}
      FRONTEND_INTERNAL_PORT: ${FRONTEND_INTERNAL_PORT:-3000}
      BFF_INTERNAL_PORT: ${BFF_INTERNAL_PORT:-3000}
      GAME_INTERNAL_PORT: ${GAME_INTERNAL_PORT:-3001}
    volumes:
      - ../infra/nginx/nginx.prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - nginx_maps:/usr/share/nginx/html/maps
    depends_on:
      - frontend
      - bff
      - game_service
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    profiles: [ "prod" ]
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      additional_contexts:
        shared: ../shared/game
    container_name: frontend
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ../shared/game:/app/shared
    expose:
      - "3000"
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bff:
    profiles: [ "prod" ]
    build:
      context: ../apps/BFF
      dockerfile: Dockerfile
    container_name: bff
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth_service:3000
      SOCIAL_SERVICE_URL: http://social_service:3000
      STATS_SERVICE_URL: http://stats_service:3000
      GAME_SERVICE_HTTP_URL: http://game_service:${GAME_INTERNAL_PORT:-3002}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    expose:
      - "3000"
    command: [ "sh", "-c", "node dist/main.js" ]
    depends_on:
      postgres_auth:
        condition: service_healthy
      postgres_social:
        condition: service_healthy
      postgres_stats:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth_service:
    profiles: [ "prod" ]
    build:
      context: ../apps/auth-user
      dockerfile: Dockerfile
    container_name: auth_service
    environment:
      NODE_ENV: production
      PORT: ${AUTH_INTERNAL_PORT:-3000}

      DB_HOST: postgres_auth
      DB_PORT: 5432
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: ${AUTH_DB_NAME}

      DATABASE_URL: postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@postgres_auth:5432/${AUTH_DB_NAME}?schema=public

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_INTERNAL_PORT:-6379}

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}

      GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_ID:-prod-google-client-id}
      GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_SECRET:-prod-google-client-secret}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3005/api/auth/callback/google}

      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}

      SERVICE_NAME: ${SERVICE_NAME:-auth-service}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
    expose:
      - "${AUTH_INTERNAL_PORT:-3000}"
    command: [ "sh", "-c", "node dist/src/main.js" ]
    depends_on:
      postgres_auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  social_service:
    profiles: [ "prod" ]
    build:
      context: ../apps/social
      dockerfile: Dockerfile
    container_name: social_service
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres_social
      DB_PORT: 5432
      DB_USER: ${SOCIAL_DB_USER}
      DB_PASSWORD: ${SOCIAL_DB_PASSWORD}
      DB_NAME: ${SOCIAL_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    expose:
      - "3000"
    command: [ "sh", "-c", "node dist/main.js" ]
    depends_on:
      postgres_social:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stats_service:
    profiles: [ "prod" ]
    build:
      context: ../apps/stats
      dockerfile: Dockerfile
    container_name: stats_service
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres_stats
      DB_PORT: 5432
      DB_USER: ${STATS_DB_USER}
      DB_PASSWORD: ${STATS_DB_PASSWORD}
      DB_NAME: ${STATS_DB_NAME}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    expose:
      - "3000"
    command: [ "sh", "-c", "node dist/main.js" ]
    depends_on:
      postgres_stats:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  game_service:
    profiles: [ "prod" ]
    build:
      context: ../apps/game
      dockerfile: Dockerfile
      additional_contexts:
        shared: ../shared/game
    container_name: game_service
    environment:
      NODE_ENV: production
      PORT: ${GAME_INTERNAL_PORT:-3001}
      DB_HOST: postgres_game
      DB_PORT: 5432
      DB_USER: ${GAME_DB_USER}
      DB_PASSWORD: ${GAME_DB_PASSWORD}
      DB_NAME: ${GAME_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MAP_EXPORT_DIR: /app/generated/maps
    expose:
      - "${GAME_INTERNAL_PORT:-3001}"
    volumes:
      - ../shared/game:/app/shared
      - nginx_maps:/app/generated/maps
    command: [ "sh", "-c", "node dist/main.js" ]
    depends_on:
      postgres_game:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [ backend ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_maps:
